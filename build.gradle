plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    // Add here additional repositories if required by some of the dependencies below.

    maven {
        url = "https://maven.blamejared.com/"
    }
}

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    compileOnly files('run/mods/create-1.21.1-6.0.10.jar')
    compileOnly files('libs/simulated-neoforge-1.21.1-1.2.1.jar')
    compileOnly files('libs/ponder-neoforge-1.0.82+mc1.21.1.jar')

    compileOnly "mezz.jei:jei-1.21.1-neoforge-api:19.21.0.247"
    runtimeOnly "mezz.jei:jei-1.21.1-neoforge:19.21.0.247"

    // Example optional mod dependency with JEI
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
    // compileOnly "mezz.jei:jei-${mc_version}-common-api:${jei_version}"
    // compileOnly "mezz.jei:jei-${mc_version}-neoforge-api:${jei_version}"
    // We add the full version to localRuntime, not runtimeOnly, so that we do not publish a dependency on it
    // localRuntime "mezz.jei:jei-${mc_version}-neoforge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// --- Modrinth modpack packaging ---------------------------------------------
// Refreshes overrides/mods/skygrad-*.jar with the freshly built mod jar, then
// zips modpack/ into build/modpack/<mod_id>-<version>.mrpack.
//
// Usage:  ./gradlew packageModpack
def modpackDir   = file('modpack')
def mrpackOutDir = layout.buildDirectory.dir('modpack')
def mrpackName   = "${mod_id}-${mod_version}.mrpack"

def modpackModsDir = file("$modpackDir/overrides/mods")

tasks.register('refreshModpackSkygradJar', Copy) {
    group = 'modpack'
    description = 'Copies the freshly built Skygrad jar into modpack/overrides/mods/.'
    dependsOn tasks.named('jar')
    from(tasks.named('jar'))
    into modpackModsDir
    doFirst {
        // Drop any older skygrad-*.jar so we never ship two copies.
        def dir = modpackModsDir
        def existing = dir.listFiles()
        if (existing != null) {
            existing.findAll { it.name.startsWith('skygrad-') && it.name.endsWith('.jar') }
                    .each { it.delete() }
        }
    }
}

tasks.register('packageModpack', Zip) {
    group = 'modpack'
    description = 'Builds the mod and packages modpack/ as a Modrinth .mrpack.'
    dependsOn 'refreshModpackSkygradJar'

    archiveFileName = mrpackName
    destinationDirectory = mrpackOutDir
    // .mrpack is a plain zip; storing modrinth.index.json + overrides at the root.
    // server-overrides/ is only applied by mrpack-install on server installs;
    // icon.png is for launchers that show a pack icon (PrismLauncher, ATLauncher).
    from(modpackDir) {
        include 'modrinth.index.json'
        include 'icon.png'
        include 'overrides/**'
        include 'server-overrides/**'
        include 'client-overrides/**'
    }

    doLast {
        logger.lifecycle("Modpack written to ${archiveFile.get().asFile}")
    }
}

// --- Server pack packaging --------------------------------------------------
// Produces a tiny bootstrap zip that ships only the .mrpack and install
// scripts. The scripts fetch nothub/mrpack-install on first run, which then
// installs NeoForge, downloads every server-required mod from Modrinth's CDN,
// and copies the modpack overrides (config + custom server-safe jars).
//
// Usage:  ./gradlew packageServerPack

def serverPackRootDir   = layout.buildDirectory.dir('serverpack')
def serverPackName      = "${mod_id}-${mod_version}-server"
def serverPackStageDir  = serverPackRootDir.map { it.dir(serverPackName) }
def serverPackZipName   = "${serverPackName}.zip"

def mrpackInstallVersion = '0.16.10'
def mrpackFileName       = "${mod_id}-${mod_version}.mrpack"
def neoforgeInstallerUrl = "https://maven.neoforged.net/releases/net/neoforged/neoforge/${project.neo_version}/neoforge-${project.neo_version}-installer.jar"

tasks.register('assembleServerPack') {
    group = 'modpack'
    description = 'Stages the lite server pack (mrpack + bootstrap scripts) under build/serverpack/.'
    dependsOn tasks.named('packageModpack')

    def mrpackArtifact = tasks.named('packageModpack').flatMap { it.archiveFile }
    inputs.file(mrpackArtifact)
    inputs.property('mrpackInstallVersion', mrpackInstallVersion)
    inputs.property('neoVersion', project.neo_version)
    inputs.property('modVersion', mod_version)
    outputs.dir(serverPackStageDir)

    def stageProvider  = serverPackStageDir
    def mrpackProvider = mrpackArtifact
    def mrpackBaseName = mrpackFileName
    def installerVer   = mrpackInstallVersion
    def modVer         = mod_version
    def neoVer         = project.neo_version
    def neoInstallerUrl = neoforgeInstallerUrl

    doLast {
        def stage = stageProvider.get().asFile
        if (stage.exists()) stage.deleteDir()
        stage.mkdirs()

        // 1) Copy the freshly built .mrpack into the stage dir.
        def mrpack = mrpackProvider.get().asFile
        new File(stage, mrpackBaseName).bytes = mrpack.bytes

        // 2) Linux/macOS bootstrap.
        new File(stage, 'install.sh').text = """\
#!/usr/bin/env bash
set -euo pipefail

MRPACK="${mrpackBaseName}"
MRPACK_INSTALL_VERSION="${installerVer}"
NEOFORGE_VERSION="${neoVer}"
NEOFORGE_INSTALLER_URL="${neoInstallerUrl}"

case "\$(uname -s)-\$(uname -m)" in
  Linux-x86_64)   ASSET=mrpack-install-linux ;;
  Linux-aarch64)  ASSET=mrpack-install-linux-arm64 ;;
  Darwin-x86_64)  ASSET=mrpack-install-darwin ;;
  Darwin-arm64)   ASSET=mrpack-install-darwin-arm64 ;;
  *) echo "Unsupported platform: \$(uname -s)-\$(uname -m)"; exit 1 ;;
esac

if [ ! -x ./mrpack-install ]; then
    echo "Fetching mrpack-install \${MRPACK_INSTALL_VERSION} (\${ASSET})..."
    curl -L -o mrpack-install \\
        "https://github.com/nothub/mrpack-install/releases/download/v\${MRPACK_INSTALL_VERSION}/\${ASSET}"
    chmod +x mrpack-install
fi

# --server-dir . overrides mrpack-install's default (which is "mc") so the
# pack lands in the current directory.
./mrpack-install "\${MRPACK}" --server-dir .

# mrpack-install deploys mods/configs/libraries but does not generate
# NeoForge's run.sh launcher. Run the NeoForge installer to produce it.
# This is idempotent: --installServer skips libraries that already exist.
if [ ! -f run.sh ]; then
    NEOFORGE_INSTALLER="neoforge-\${NEOFORGE_VERSION}-installer.jar"
    if [ ! -f "\${NEOFORGE_INSTALLER}" ]; then
        echo "Fetching NeoForge installer \${NEOFORGE_VERSION}..."
        curl -L -o "\${NEOFORGE_INSTALLER}" "\${NEOFORGE_INSTALLER_URL}"
    fi
    java -jar "\${NEOFORGE_INSTALLER}" --installServer
fi

if [ ! -f eula.txt ]; then
    cat > eula.txt <<EOF
# By setting eula=true you are agreeing to https://aka.ms/MinecraftEULA
eula=false
EOF
fi

echo
echo "Install complete. Set eula=true in eula.txt then run ./run.sh."
"""

        // 3) Windows bootstrap.
        new File(stage, 'install.bat').text = """\
@echo off
setlocal
set MRPACK=${mrpackBaseName}
set MRPACK_INSTALL_VERSION=${installerVer}
set NEOFORGE_VERSION=${neoVer}
set NEOFORGE_INSTALLER_URL=${neoInstallerUrl}
set INSTALLER=mrpack-install.exe

if not exist %INSTALLER% (
    echo Fetching mrpack-install %MRPACK_INSTALL_VERSION%...
    powershell -Command "Invoke-WebRequest -Uri 'https://github.com/nothub/mrpack-install/releases/download/v%MRPACK_INSTALL_VERSION%/mrpack-install-windows.exe' -OutFile '%INSTALLER%'"
)

%INSTALLER% %MRPACK% --server-dir .

if not exist run.bat (
    set NEOFORGE_INSTALLER=neoforge-%NEOFORGE_VERSION%-installer.jar
    if not exist %NEOFORGE_INSTALLER% (
        echo Fetching NeoForge installer %NEOFORGE_VERSION%...
        powershell -Command "Invoke-WebRequest -Uri '%NEOFORGE_INSTALLER_URL%' -OutFile '%NEOFORGE_INSTALLER%'"
    )
    java -jar %NEOFORGE_INSTALLER% --installServer
)

if not exist eula.txt (
    echo # By setting eula=true you are agreeing to https://aka.ms/MinecraftEULA> eula.txt
    echo eula=false>> eula.txt
)

echo.
echo Install complete. Set eula=true in eula.txt then run run.bat.
endlocal
"""

        // 4) README.
        new File(stage, 'README.txt').text = """\
Skygrad ${modVer} server pack (lite)
====================================

Bootstrap pack -- mods are NOT bundled. They download on first install from
Modrinth's CDN, so an internet connection is required at install time.

1. Install Java 21 (Temurin or Microsoft OpenJDK).
2. Run install.sh (Linux/macOS) or install.bat (Windows).
   This fetches nothub/mrpack-install ${installerVer}, which then:
     - installs the NeoForge dedicated server matching this pack,
     - downloads every server-required mod from ${mrpackBaseName},
     - copies modpack overrides (config + custom server-safe jars).
3. Open eula.txt and set eula=true (you are agreeing to
   https://aka.ms/MinecraftEULA).
4. Start the server with ./run.sh (Linux/macOS) or run.bat (Windows) --
   these are produced by the NeoForge installer that mrpack-install runs.

JVM args live in user_jvm_args.txt, which NeoForge generates on first install.
Edit it to taste (e.g. -Xmx6G -Xms2G).
"""

        logger.lifecycle("Lite server pack staged at ${stage}")
    }
}

tasks.register('packageServerPack', Zip) {
    group = 'modpack'
    description = 'Zips the lite server pack into build/serverpack/.'
    dependsOn 'assembleServerPack'

    archiveFileName = serverPackZipName
    destinationDirectory = serverPackRootDir
    from(serverPackStageDir) {
        into serverPackName
    }

    doLast {
        logger.lifecycle("Server pack zip written to ${archiveFile.get().asFile}")
    }
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
